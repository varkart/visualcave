name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  pii-scan:
    name: PII scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Scan for personal email domains
        run: |
          PATTERN="[a-zA-Z0-9._%+\-]+@(gmail|outlook|hotmail|live|icloud|me|mac|yahoo|protonmail|pm)\.(com|net|org)"
          MATCHES=$(grep -rIiE "$PATTERN" \
            --include="*.ts" --include="*.tsx" --include="*.js" \
            --include="*.rs" --include="*.py" --include="*.go" \
            --include="*.toml" --include="*.json" --include="*.yml" \
            --include="*.yaml" --include="*.md" --include="*.rb" \
            --include="*.html" --include="*.css" \
            . 2>/dev/null | grep -v "node_modules" || true)
          if [[ -n "$MATCHES" ]]; then
            echo "BLOCKED: personal email address found in source files"
            echo "$MATCHES"
            exit 1
          fi
          echo "PII scan passed."

  license-check:
    name: License compliance
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install dependencies
        run: npm install --legacy-peer-deps
      - name: Check dependency licenses
        run: |
          npx license-checker \
            --onlyAllow "MIT;Apache-2.0;ISC;BSD-2-Clause;BSD-3-Clause;Unlicense;0BSD;CC0-1.0;CC-BY-3.0;CC-BY-4.0;Python-2.0" \
            --excludePrivatePackages \
            --excludePackages "gif-encoder-2@1.0.5" \
            --production \
            --summary

  security-audit:
    name: Security audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install dependencies
        run: npm install --legacy-peer-deps
      - name: npm audit (high + critical only)
        run: npm audit --audit-level=high --legacy-peer-deps

  validate:
    name: Playwright — validate all examples render
    runs-on: ubuntu-latest
    needs: [license-check, security-audit]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install dependencies
        run: npm install --legacy-peer-deps
      - name: Run ESLint check
        run: npm run lint
      - name: Check Prettier formatting
        run: npm run format:check
      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
      - name: Run diagram validation tests
        run: npx playwright test
      - name: Upload screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: diagram-screenshots
          path: tests/screenshots/
          retention-days: 14
      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: tests/report/
          retention-days: 7
